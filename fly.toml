app = "lerntheke-kreise"
primary_region = "fra"

[build]

[env]
  PORT = "3000"
  DB_PATH = "/data/lerntheke.db"
  SESSION_DB = "/data/sessions.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "lerntheke_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
