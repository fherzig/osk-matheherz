<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin – Lerntheke Kreise</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #d95f2b; --ink: #1c1917; --ink2: #78716c;
  --bg: #faf9f7; --card: #fff; --border: #e7e5e4; --r: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,.07);
  --g-pflicht: #d95f2b; --g-basis: #2563eb; --g-aufbau: #16a34a; --g-abflug: #9333ea;
}
body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--ink); }
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

/* ── Header ── */
.bar {
  background: var(--card); border-bottom: 1.5px solid var(--border);
  padding: 0 24px; height: 56px; display: flex; align-items: center;
  justify-content: space-between; position: sticky; top: 0; z-index: 10;
}
.bar-title { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; }
.bar-title em { color: var(--accent); font-style: normal; }
.bar-right { display: flex; align-items: center; gap: 12px; }
.bar-user { font-size: 13px; color: var(--ink2); }
.btn-sm { padding: 7px 16px; border-radius: 8px; border: 1.5px solid var(--border);
  background: var(--card); font-size: 13px; cursor: pointer; font-weight: 600; }
.btn-sm:hover { background: #f5f5f4; }
.btn-accent { background: var(--accent); color: white; border-color: var(--accent); }
.btn-accent:hover { opacity: .9; background: var(--accent); }

/* ── Layout ── */
.inner { max-width: 1200px; margin: 0 auto; padding: 24px; }
.tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 2px solid var(--border); padding-bottom: 0; }
.tab { padding: 10px 18px; border-radius: 8px 8px 0 0; font-size: 14px; font-weight: 600;
  cursor: pointer; color: var(--ink2); border: 1.5px solid transparent; border-bottom: none;
  margin-bottom: -2px; background: transparent; }
.tab.active { color: var(--accent); border-color: var(--border); border-bottom-color: var(--card);
  background: var(--card); }

.section { display: none; }
.section.active { display: block; }

/* ── Filters ── */
.filter-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 18px; }
.filter-bar select, .filter-bar input { padding: 8px 12px; border-radius: 8px; border: 1.5px solid var(--border);
  background: var(--card); font-size: 14px; font-family: inherit; outline: none; }
.filter-bar select:focus, .filter-bar input:focus { border-color: var(--accent); }

/* ── Table ── */
.tbl-wrap { overflow-x: auto; border-radius: var(--r); border: 1.5px solid var(--border);
  box-shadow: var(--shadow); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #f5f5f4; padding: 10px 14px; text-align: left; font-weight: 600;
  color: var(--ink2); font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
td { padding: 10px 14px; border-top: 1px solid var(--border); vertical-align: middle; }
tr:hover td { background: #fafaf9; }

/* ── Progress pills ── */
.pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px;
  border-radius: 99px; font-size: 11px; font-weight: 700; font-family: 'DM Mono', monospace; }
.pill-pflicht { background: #fff7f4; color: var(--g-pflicht); border: 1.5px solid #fcd9c8; }
.pill-basis   { background: #eff6ff; color: var(--g-basis);   border: 1.5px solid #bfdbfe; }
.pill-aufbau  { background: #f0fdf4; color: var(--g-aufbau);  border: 1.5px solid #bbf7d0; }
.pill-abflug  { background: #faf5ff; color: var(--g-abflug);  border: 1.5px solid #e9d5ff; }
.pill.done::before { content: '✓ '; }

/* ── Progress bar mini ── */
.prog-mini { display: flex; gap: 3px; }
.prog-seg { height: 8px; border-radius: 99px; flex: 1; background: var(--border); }
.prog-seg.done { background: currentColor; }

/* ── Form ── */
.form-card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--r);
  padding: 24px; margin-bottom: 24px; box-shadow: var(--shadow); }
.form-card h3 { font-family: 'Syne', sans-serif; font-size: 16px; margin-bottom: 18px; }
.form-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 14px; }
.form-row label { font-size: 12px; font-weight: 600; color: var(--ink2); display: block; margin-bottom: 5px; }
.form-row input, .form-row select {
  width: 100%; padding: 9px 12px; border-radius: 8px; border: 1.5px solid var(--border);
  font-size: 14px; font-family: inherit; outline: none; }
.form-row input:focus, .form-row select:focus { border-color: var(--accent); }
.msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 10px; display: none; }
.msg.ok  { background: #f0fdf4; color: #15803d; border: 1.5px solid #bbf7d0; }
.msg.err { background: #fff1f2; color: #be123c; border: 1.5px solid #fecdd3; }
.msg.show { display: block; }

/* ── Bulk import ── */
.bulk-area { width: 100%; min-height: 120px; padding: 12px; border: 1.5px solid var(--border);
  border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 13px;
  background: #fafaf9; resize: vertical; outline: none; }
.bulk-area:focus { border-color: var(--accent); }

/* ── Stats cards ── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }
.stat-card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--r);
  padding: 18px 20px; box-shadow: var(--shadow); }
.stat-num { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; color: var(--accent); }
.stat-label { font-size: 13px; color: var(--ink2); margin-top: 4px; }

/* ── Action buttons in table ── */
.btn-tiny { padding: 4px 10px; border-radius: 6px; font-size: 12px; border: 1.5px solid var(--border);
  background: transparent; cursor: pointer; color: var(--ink2); font-weight: 600; }
.btn-tiny:hover { background: #f5f5f4; }
.btn-danger { color: #dc2626; border-color: #fecaca; }
.btn-danger:hover { background: #fff1f2; }
</style>
</head>
<body>
<div class="bar">
  <div class="bar-title">🎓 Lerntheke <em>Admin</em></div>
  <div class="bar-right">
    <span class="bar-user" id="bar-user"></span>
    <button class="btn-sm" onclick="doLogout()">Abmelden</button>
  </div>
</div>

<div class="inner">
  <div class="tabs">
    <button class="tab active" onclick="showTab('overview')">📊 Übersicht</button>
    <button class="tab" onclick="showTab('users')">👥 Schüler:innen</button>
    <button class="tab" onclick="showTab('add')">➕ Hinzufügen</button>
  </div>

  <!-- ── OVERVIEW TAB ── -->
  <div class="section active" id="tab-overview">
    <div class="stats-grid" id="stats-grid"></div>

    <div class="filter-bar">
      <select id="filter-klasse" onchange="renderTable()">
        <option value="">Alle Klassen</option>
      </select>
      <input type="text" id="filter-search" placeholder="Suchen…" oninput="renderTable()">
      <select id="filter-status" onchange="renderTable()">
        <option value="">Alle Status</option>
        <option value="basis">Basis-LZK bereit</option>
        <option value="aufbau">Aufbau-LZK bereit</option>
        <option value="none">Noch nicht bereit</option>
      </select>
      <button class="btn-sm" onclick="loadOverview()">↺ Aktualisieren</button>
      <button class="btn-sm btn-accent" onclick="exportCSV()">⬇ CSV Export</button>
    </div>

    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th><th>Klasse</th>
            <th>🔴 Pflicht</th><th>🔵 Basis</th><th>🟢 Aufbau</th><th>🟣 Abflug</th>
            <th>LZK-Status</th><th>Zuletzt aktiv</th><th></th>
          </tr>
        </thead>
        <tbody id="student-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- ── USERS TAB ── -->
  <div class="section" id="tab-users">
    <div class="filter-bar">
      <select id="filter-klasse2" onchange="renderUsersTable()">
        <option value="">Alle Klassen</option>
      </select>
      <input type="text" id="filter-search2" placeholder="Suchen…" oninput="renderUsersTable()">
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr><th>Name</th><th>Klasse</th><th>Rolle</th><th>Erstellt</th><th>Aktionen</th></tr>
        </thead>
        <tbody id="users-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- ── ADD TAB ── -->
  <div class="section" id="tab-add">
    <div class="form-card">
      <h3>Einzeln hinzufügen</h3>
      <div class="form-row">
        <div>
          <label>Benutzername</label>
          <input type="text" id="new-username" placeholder="max.mustermann">
        </div>
        <div>
          <label>Passwort</label>
          <input type="text" id="new-password" placeholder="Mindestens 6 Zeichen">
        </div>
        <div>
          <label>Klasse</label>
          <select id="new-klasse">
            <option value="10a">10a</option>
            <option value="10b">10b</option>
            <option value="10c">10c</option>
            <option value="10d">10d</option>
          </select>
        </div>
        <div>
          <label>Rolle</label>
          <select id="new-role">
            <option value="student">Schüler:in</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>
      <button class="btn-sm btn-accent" onclick="addUser()">Hinzufügen</button>
      <div class="msg" id="add-msg"></div>
    </div>

    <div class="form-card">
      <h3>Massen-Import (CSV)</h3>
      <p style="font-size:13px;color:var(--ink2);margin-bottom:12px;">
        Ein Eintrag pro Zeile: <code style="background:#f5f5f4;padding:2px 6px;border-radius:4px;font-family:monospace">benutzername,passwort,klasse</code>
      </p>
      <textarea class="bulk-area" id="bulk-csv" placeholder="max.mustermann,Passwort123,10a&#10;maria.muster,Passwort456,10b&#10;..."></textarea>
      <br><br>
      <button class="btn-sm btn-accent" onclick="bulkImport()">Importieren</button>
      <div class="msg" id="bulk-msg"></div>
    </div>
  </div>
</div>

<script>
// ── Station groups (matches lerntheke.html) ──────────────────────
const GROUPS = {
  Pflicht: { required: 2, total: 2 },
  Basis:   { required: 4, total: 7 },
  Aufbau:  { required: 4, total: 6 },
  Abflug:  { required: 1, total: 2 }
};
const STATION_GROUPS = [
  'Pflicht','Pflicht',
  'Basis','Basis','Basis','Basis','Basis','Basis','Basis',
  'Aufbau','Aufbau','Aufbau','Aufbau','Aufbau','Aufbau',
  'Basis',  // Frisbeeringe idx 11
  'Pflicht', // Repetitorium idx 12
  'Aufbau','Aufbau', // Tunnelbohrer, London Eye
  'Abflug','Abflug'
];
// idx 0-16 → group
const IDX_TO_GROUP = {
  0:'Pflicht',1:'Basis',2:'Basis',3:'Basis',4:'Basis',5:'Basis',6:'Basis',
  7:'Aufbau',8:'Aufbau',9:'Aufbau',10:'Basis',11:'Basis',12:'Pflicht',
  13:'Aufbau',14:'Aufbau',15:'Abflug',16:'Abflug'
};

let allStudents = [];

// ── Init ─────────────────────────────────────────────────────────
async function init() {
  const me = await fetch('/api/me').then(r => r.json());
  if (!me.loggedIn || me.role !== 'admin') {
    window.location.href = '/';
    return;
  }
  document.getElementById('bar-user').textContent = me.username + ' (' + me.klasse + ')';
  await loadOverview();
  await loadKlassen();
}

// ── Tabs ─────────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
}

// ── Load data ────────────────────────────────────────────────────
async function loadOverview() {
  const data = await fetch('/api/admin/overview').then(r => r.json());
  allStudents = data;
  renderStats();
  renderTable();
  renderUsersTable();
}

async function loadKlassen() {
  const klassen = await fetch('/api/admin/klassen').then(r => r.json());
  ['filter-klasse','filter-klasse2'].forEach(id => {
    const sel = document.getElementById(id);
    const val = sel.value;
    sel.innerHTML = '<option value="">Alle Klassen</option>';
    klassen.forEach(k => sel.innerHTML += `<option value="${k}">${k}</option>`);
    sel.value = val;
  });
}

// ── Stats ────────────────────────────────────────────────────────
function calcStatus(s) {
  const doneSet = new Set(s.done);
  const groups = {};
  for (const [g, info] of Object.entries(GROUPS)) {
    const ids = Object.entries(IDX_TO_GROUP).filter(([,gr])=>gr===g).map(([id])=>+id);
    const done = ids.filter(id => doneSet.has(id)).length;
    groups[g] = { done, req: info.required, ok: done >= info.required };
  }
  return groups;
}

function renderStats() {
  const total = allStudents.length;
  let basisReady = 0, aufbauReady = 0, anyProgress = 0;
  for (const s of allStudents) {
    const g = calcStatus(s);
    if (s.done.length > 0) anyProgress++;
    if (g.Pflicht.ok && g.Basis.ok) basisReady++;
    if (g.Pflicht.ok && g.Basis.ok && g.Aufbau.ok) aufbauReady++;
  }
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Schüler:innen gesamt</div></div>
    <div class="stat-card"><div class="stat-num">${anyProgress}</div><div class="stat-label">Haben begonnen</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#2563eb">${basisReady}</div><div class="stat-label">Bereit für Basis-LZK</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#16a34a">${aufbauReady}</div><div class="stat-label">Bereit für Aufbau-LZK</div></div>
  `;
}

// ── Table ────────────────────────────────────────────────────────
function renderTable() {
  const klasse = document.getElementById('filter-klasse').value;
  const search = document.getElementById('filter-search').value.toLowerCase();
  const status = document.getElementById('filter-status').value;

  let students = allStudents.filter(s => {
    if (klasse && s.klasse !== klasse) return false;
    if (search && !s.username.toLowerCase().includes(search)) return false;
    if (status) {
      const g = calcStatus(s);
      if (status === 'basis' && !(g.Pflicht.ok && g.Basis.ok)) return false;
      if (status === 'aufbau' && !(g.Pflicht.ok && g.Basis.ok && g.Aufbau.ok)) return false;
      if (status === 'none' && (g.Pflicht.ok && g.Basis.ok)) return false;
    }
    return true;
  });

  document.getElementById('student-tbody').innerHTML = students.map(s => {
    const g = calcStatus(s);
    const lastActive = s.last_active
      ? new Date(s.last_active).toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})
      : '–';

    const lzkStatus = g.Pflicht.ok && g.Basis.ok && g.Aufbau.ok
      ? '<span style="color:#16a34a;font-weight:700;">🚀 Aufbau-LZK</span>'
      : g.Pflicht.ok && g.Basis.ok
        ? '<span style="color:#2563eb;font-weight:700;">✅ Basis-LZK</span>'
        : '<span style="color:#94a3b8;">–</span>';

    const pill = (grp, cls) => {
      const gi = g[grp];
      const isDone = gi.ok;
      const abg = s.abgabe && s.abgabe[grp];
      return `<span class="pill pill-${cls.toLowerCase()}${isDone?' done':''}">${gi.done}/${gi.req}${abg?' 📋':''}</span>`;
    };

    return `<tr>
      <td><strong>${s.username}</strong></td>
      <td>${s.klasse}</td>
      <td>${pill('Pflicht','pflicht')}</td>
      <td>${pill('Basis','basis')}</td>
      <td>${pill('Aufbau','aufbau')}</td>
      <td>${pill('Abflug','abflug')}</td>
      <td>${lzkStatus}</td>
      <td style="color:var(--ink2);font-size:12px;">${lastActive}</td>
      <td>
        <button class="btn-tiny btn-danger" onclick="deleteUser(${s.id},'${s.username}')">Löschen</button>
        <button class="btn-tiny" onclick="resetProgress(${s.id},'${s.username}')">Reset</button>
      </td>
    </tr>`;
  }).join('');

  if (students.length === 0) {
    document.getElementById('student-tbody').innerHTML =
      '<tr><td colspan="9" style="text-align:center;color:var(--ink2);padding:24px;">Keine Einträge gefunden</td></tr>';
  }
}

function renderUsersTable() {
  const klasse = document.getElementById('filter-klasse2').value;
  const search = document.getElementById('filter-search2').value.toLowerCase();
  const all = allStudents.filter(s =>
    (!klasse || s.klasse === klasse) &&
    (!search || s.username.toLowerCase().includes(search))
  );
  document.getElementById('users-tbody').innerHTML = all.map(s => `
    <tr>
      <td><strong>${s.username}</strong></td>
      <td>${s.klasse}</td>
      <td>Schüler:in</td>
      <td style="color:var(--ink2);font-size:12px;">${s.created_at ? new Date(s.created_at).toLocaleDateString('de-DE') : '–'}</td>
      <td>
        <button class="btn-tiny" onclick="changePassword(${s.id},'${s.username}')">Passwort ändern</button>
        <button class="btn-tiny btn-danger" onclick="deleteUser(${s.id},'${s.username}')">Löschen</button>
      </td>
    </tr>
  `).join('');
}

// ── Actions ──────────────────────────────────────────────────────
async function deleteUser(id, name) {
  if (!confirm(`${name} wirklich löschen? Alle Daten gehen verloren!`)) return;
  await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
  await loadOverview();
}

async function resetProgress(id, name) {
  if (!confirm(`Fortschritt von ${name} zurücksetzen?`)) return;
  await fetch(`/api/admin/users/${id}/reset`, { method: 'POST' });
  await loadOverview();
}

async function changePassword(id, name) {
  const pw = prompt(`Neues Passwort für ${name}:`);
  if (!pw || pw.length < 4) return;
  const r = await fetch(`/api/admin/users/${id}/password`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ password: pw })
  });
  if (r.ok) alert('Passwort geändert!');
}

async function addUser() {
  const username = document.getElementById('new-username').value.trim();
  const password = document.getElementById('new-password').value;
  const klasse = document.getElementById('new-klasse').value;
  const role = document.getElementById('new-role').value;
  const msg = document.getElementById('add-msg');

  const r = await fetch('/api/admin/users', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ username, password, klasse, role })
  });
  const d = await r.json();
  msg.textContent = r.ok ? `✓ ${username} erstellt!` : `❌ ${d.error}`;
  msg.className = 'msg show ' + (r.ok ? 'ok' : 'err');
  if (r.ok) {
    document.getElementById('new-username').value = '';
    document.getElementById('new-password').value = '';
    await loadOverview();
    await loadKlassen();
  }
}

async function bulkImport() {
  const csv = document.getElementById('bulk-csv').value.trim();
  const msg = document.getElementById('bulk-msg');
  const lines = csv.split('\n').filter(l => l.trim());
  const users = lines.map(l => {
    const parts = l.split(',').map(p => p.trim());
    return { username: parts[0], password: parts[1], klasse: parts[2] || '10a', role: 'student' };
  }).filter(u => u.username && u.password);

  if (!users.length) { msg.textContent = '❌ Keine gültigen Zeilen.'; msg.className = 'msg show err'; return; }

  const r = await fetch('/api/admin/users/bulk', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(users)
  });
  const d = await r.json();
  msg.textContent = r.ok ? `✓ ${d.created} von ${users.length} Accounts erstellt.` : `❌ ${d.error}`;
  msg.className = 'msg show ' + (r.ok ? 'ok' : 'err');
  if (r.ok) { await loadOverview(); await loadKlassen(); }
}

function exportCSV() {
  const rows = [['Name','Klasse','Pflicht','Basis','Aufbau','Abflug','LZK-Status','Zuletzt aktiv']];
  for (const s of allStudents) {
    const g = calcStatus(s);
    const lzk = g.Pflicht.ok && g.Basis.ok && g.Aufbau.ok ? 'Aufbau-LZK' : g.Pflicht.ok && g.Basis.ok ? 'Basis-LZK' : '-';
    rows.push([s.username, s.klasse,
      `${g.Pflicht.done}/${g.Pflicht.req}`, `${g.Basis.done}/${g.Basis.req}`,
      `${g.Aufbau.done}/${g.Aufbau.req}`, `${g.Abflug.done}/${g.Abflug.req}`,
      lzk, s.last_active ? new Date(s.last_active).toLocaleDateString('de-DE') : '-'
    ]);
  }
  const csv = rows.map(r => r.join(';')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'}));
  a.download = `lerntheke_fortschritt_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

async function doLogout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/';
}

init();
</script>
</body>
</html>
